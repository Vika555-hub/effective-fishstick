<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskLite — To Do</title>
</head>

<body>
    <header class="header">
        <div class="header__container container">
            <h1 class="header__title">
                TaskLite
            </h1>
            <nav class="header__nav">
                <a href="#" class="header__link">To Do</a>
                <a href="#" class="header__link">Kanban</a>
                <a href="#" class="header__link">Привычки</a>
            </nav>
        </div>
    </header>
    <main class="container todo__container">
        <h1 class="todo__title">Задачи</h1>

        <form class="form-add">
            <input type="text" placeholder="Введите задачу" class="form-add__input">
            <button type="sudmit" class="form-add__btn">Добавить</button>
        </form>
        <div class="toolbar">
            <input type="text" class="toolbar__search" placeholder="Поиск...">
            <div class="toolbar__tabs tabs">
                <button class="tabs__btn">Все</button>
                <button class="tabs__btn">Активные</button>
                <button class="tabs__btn">Завершенные</button>
            </div>
            <select class="toolbar__sort">
                <option value="1">Сначала новые</option>
                <option value="2">Сначала старые</option>
            </select>
            <div class="task">
                <div class="task__content">
                    <div class="task__title">Пример задачи</div>
                    <div class="task__meta">26.09.2025, 15:49</div>
                </div>
                <div class="task__actions">
                    <button class="task__action task__action--edit">
                        <svg class="task__icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#6f64a3"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 20h9" />
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                        </svg>
                    </button>
                    <button class="task__action task__action--delete">
                        <svg class="task__icon" viewBox="0 0 24 24" width="14 " height="14" fill="none" stroke="#cb6e6e"
                            stroke-widsth="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                            <path d="M10 11v6" />
                            <path d="M14 11v6" />
                            <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" />
                        </svg>
                    </button>
                </div>
            </div>


        </div>
    </main>
</body>

</html>
